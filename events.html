    <style>        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--cobalt:#336699;--cobalt-dark:#1a3a5a;--cobalt-light:#4a86c2;--bg:#EDEAE2;--bg-alt:#E4E0D7;--bg-card:#ffffff;--text:#111111;--text-muted:#5a5a52;--text-light:#7a7a72;--border:#D4D0C8;}
        html{scroll-behavior:smooth;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
        .page-hero{min-height:50vh;display:flex;align-items:center;justify-content:center;background:var(--bg-alt);padding:120px 24px 80px;text-align:center;}
        .page-hero h1{font-family:'Radley',Georgia,'Times New Roman',serif;font-size:clamp(2.25rem,5vw,3.5rem);font-weight:700;color:var(--text);margin-bottom:20px;line-height:1.15;}
        .page-hero p{font-size:1.15rem;color:var(--text-muted);max-width:720px;margin:0 auto;line-height:1.75;}
        .container{max-width:1200px;margin:0 auto;padding:0 24px;}
        /* Events list – built to scale for multiple events */
        .events-list{max-width:1000px;margin:0 auto;padding:48px 24px 100px;}
        .event-entry{background:var(--bg);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:64px;box-shadow:0 4px 24px rgba(0,0,0,0.04);transition:box-shadow .3s,border-color .3s;}
        .event-entry:hover{box-shadow:0 12px 48px -12px rgba(51,102,153,0.15);border-color:rgba(51,102,153,0.2);}
        .event-header{padding:40px 40px 24px;}
        .event-badge{display:inline-block;background:rgba(51,102,153,0.1);color:var(--cobalt);font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;padding:6px 14px;border-radius:100px;margin-bottom:16px;}
        .event-badge.past{background:var(--bg-alt);color:var(--text-muted);}
        .event-entry h2{font-family:'Radley',Georgia,serif;font-size:clamp(1.75rem,3.5vw,2.5rem);font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.2;}
        .event-meta{display:flex;flex-wrap:wrap;gap:20px 32px;color:var(--text-muted);font-size:0.95rem;margin-bottom:24px;}
        .event-meta span{display:flex;align-items:center;gap:8px;}
        .event-meta svg{width:18px;height:18px;flex-shrink:0;stroke:var(--cobalt);stroke-width:1.5;fill:none;}
        .event-description{font-size:1.05rem;color:var(--text-muted);line-height:1.75;}
        .event-description strong{color:var(--text);}
        .event-body{padding:0 40px 40px;}
        /* Minimal video player */
        .video-wrap{position:relative;width:100%;border-radius:12px;overflow:hidden;background:#0a0a0a;}
        .video-wrap.aspect-16x9{aspect-ratio:16/9;}
        .video-wrap video{display:block;width:100%;height:100%;object-fit:cover;}
        .video-wrap.video-wrap-embed{position:relative;}
        .video-wrap.video-wrap-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
        .video-wrap.video-wrap-link{position:relative;display:block;text-decoration:none;color:inherit;}
        .video-wrap.video-wrap-link img{display:block;width:100%;height:100%;object-fit:cover;}
        .video-wrap.video-wrap-play{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,0.35);color:#fff;font-weight:600;font-size:1rem;transition:background .2s;}
        .video-wrap.video-wrap-link:hover .video-wrap-play{background:rgba(0,0,0,0.5);}
        .video-wrap.video-wrap-play svg{width:56px;height:56px;}
        .video-wrap .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);cursor:pointer;transition:opacity .25s;}
        .video-wrap .play-overlay:hover{background:rgba(0,0,0,0.45);}
        .video-wrap .play-overlay.hidden{opacity:0;pointer-events:none;}
        .video-wrap .play-btn{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.95);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,0.3);transition:transform .2s,background .2s;}
        .video-wrap .play-btn:hover{transform:scale(1.08);background:#fff;}
        .video-wrap .play-btn svg{width:28px;height:28px;margin-left:4px;fill:var(--cobalt-dark);}
        .video-wrap video::-webkit-media-controls-panel{background:linear-gradient(transparent,rgba(0,0,0,.6));}
        .video-label{font-size:0.85rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;}
        /* Media grid */
        .event-media{margin-top:40px;}
        .event-trailer{margin-bottom:40px;}
        .event-gallery{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:16px;margin-bottom:40px;}
        .event-gallery .gallery-a{grid-column:1;grid-row:1 / 3;border-radius:12px;overflow:hidden;}
        .event-gallery .gallery-b,.event-gallery .gallery-c{border-radius:12px;overflow:hidden;}
        .event-gallery img{width:100%;height:100%;object-fit:cover;display:block;vertical-align:middle;}
        .event-gallery .gallery-a img{min-height:280px;}
        .event-gallery .gallery-b img,.event-gallery .gallery-c img{min-height:132px;}
        .event-ctas{display:flex;flex-wrap:wrap;gap:16px;margin-top:32px;}
        .event-ctas a{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;border-radius:10px;font-weight:600;font-size:0.95rem;text-decoration:none;transition:all .2s;}
        .event-ctas .btn-primary{background:var(--cobalt);color:#fff;}
        .event-ctas .btn-primary:hover{background:var(--cobalt-dark);}
        .event-ctas .btn-secondary{border:1px solid var(--border);color:var(--text);}
        .event-ctas .btn-secondary:hover{border-color:var(--cobalt);color:var(--cobalt);}
            .event-header,.event-body{padding:28px 20px;}
            .event-gallery{grid-template-columns:1fr;grid-template-rows:auto;}
            .event-gallery .gallery-a{grid-row:auto;}
            .event-gallery .gallery-a img{min-height:220px;}
        }
        @media(max-width:768px){.nav-links,.nav-cta-group{display:none;}.hamburger{display:flex;}.footer-content{grid-template-columns:1fr;}}
    </style>
